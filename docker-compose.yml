services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: clbh
      CORS_ORIGINS: http://localhost:3000
      # Protects /api/admin/* endpoints (loaded from .env)
      ADMIN_KEY: ${ADMIN_KEY}
      # Kit (ConvertKit) integration
      KIT_API_KEY: ${KIT_API_KEY}
      KIT_FORM_ID: ${KIT_FORM_ID}
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        REACT_APP_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:

